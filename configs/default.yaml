# Default configuration for Feature Importance XAI project

# Data configuration
data:
  dataset: "synthetic"  # Options: synthetic, iris, wine, breast_cancer
  n_samples: 1000
  n_features: 10
  n_informative: 5
  n_redundant: 2
  n_classes: 2
  task_type: "classification"  # Options: classification, regression
  noise: 0.1
  test_size: 0.2
  random_state: 42
  scale_features: true

# Model configuration
model:
  type: "random_forest"  # Options: random_forest, gradient_boosting, linear
  n_estimators: 100
  max_depth: null
  min_samples_split: 2
  min_samples_leaf: 1
  random_state: 42

# Explainer configuration
explainer:
  methods: ["permutation", "tree", "shap"]  # Options: permutation, tree, shap, sage, stability, cv
  n_samples: 1000  # For SHAP/SAGE
  n_repeats: 10   # For permutation importance
  n_splits: 5     # For stability analysis
  random_state: 42

# SHAP configuration
shap:
  method: "tree"  # Options: tree, kernel, deep, linear
  n_samples: 100
  random_state: 42

# Evaluation configuration
evaluation:
  compute_faithfulness: true
  compute_stability: true
  compute_fidelity: true
  n_cv_folds: 5
  n_bootstrap: 100
  bootstrap_size: 0.8

# Visualization configuration
visualization:
  figsize: [12, 8]
  dpi: 100
  top_k: 10
  save_plots: true
  plot_format: "png"
  interactive: false

# Output configuration
output:
  save_results: true
  results_dir: "results"
  plots_dir: "assets"
  log_level: "INFO"
  random_state: 42

# Demo configuration
demo:
  port: 8501
  host: "localhost"
  debug: false
  theme: "light"
